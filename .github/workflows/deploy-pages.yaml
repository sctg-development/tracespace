name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch: 

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Build all apps
        run: npm run build

      - name: Build Vite app for apps/view
        run: npx vite build --base=/tracespace
        working-directory: apps/view

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'apps/view/dist'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
